<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NeuralTalkAI</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="wrap">
<div class="card">

<h1>NeuralTalkAI</h1>
<p class="sub">10 Indian Languages • 10 Voices • Gemini TTS</p>

<!-- Auth -->
<div id="authBox">
<input id="email" type="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<div class="grid">
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Sign In</button>
</div>
</div>

<!-- App -->
<div id="appBox" style="display:none;">

<div class="topbar">
<span id="userEmail"></span>
<span>Credits: <b id="credits">0</b></span>
</div>

<textarea id="text" placeholder="Paste your story here..."></textarea>

<select id="language">
<option>Tamil</option>
<option>Hindi</option>
<option>Telugu</option>
<option>Malayalam</option>
<option>Kannada</option>
<option>Marathi</option>
<option>Gujarati</option>
<option>Bengali</option>
<option>Punjabi</option>
<option>English India</option>
</select>

<select id="voice">
<option>Kore</option>
<option>Puck</option>
<option>Zephyr</option>
<option>Aoede</option>
<option>Fenrir</option>
<option>Sulafat</option>
<option>Orus</option>
<option>Charon</option>
<option>Algenib</option>
<option>Sadaltager</option>
</select>

<input id="style" placeholder="Storyteller / Calm / News Reader">

<label>Pitch: <span id="pitchValue">0</span></label>
<input type="range" id="pitch" min="-10" max="10" value="0">

<button onclick="generateAudio()">Generate Audio</button>

<div class="plans">
<button onclick="buyPlan(149)">₹149 / 35k</button>
<button onclick="buyPlan(299)">₹299 / 80k</button>
<button onclick="buyPlan(599)">₹599 / 170k</button>
</div>

<p id="status"></p>

<audio id="player" controls style="display:none;width:100%"></audio>
<a id="download" style="display:none">Download Audio</a>

</div>

</div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
