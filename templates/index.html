<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuralTalk AI - Text to Speech</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="logo">NeuralTalk AI</h1>
            <nav>
                <a href="#">Pricing</a>
                <button class="btn-primary">Get Started</button>
            </nav>
        </header>

        <main>
            <div class="glass-card">
                <h3>குரலைத் தேர்ந்தெடுக்கவும்</h3>
                
                <div class="input-group">
                    <label>Language (ஆதரிக்கப்படும் மொழிகள்)</label>
                    <select id="langSelect" onchange="updateVoices()">
                        <option value="ta-IN">Tamil (தமிழ்)</option>
                        <option value="en-IN">English (India)</option>
                        <option value="hi-IN">Hindi (हिन्दी)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Voice Model</label>
                    <select id="voiceSelect">
                        </select>
                </div>

                <div class="wallet-badge">
                    <span>Wallet Balance</span>
                    <strong id="balanceDisplay">50,000 Credits</strong>
                </div>

                <textarea id="textInput" placeholder="இங்கே டைப் செய்யவும்..."></textarea>

                <div class="terms-area">
                    <input type="checkbox" id="termsCheckbox" onchange="toggleButton()">
                    <label for="termsCheckbox">நான் விதிமுறைகள் மற்றும் ரீஃபண்ட் கொள்கைகளை ஏற்றுக்கொள்கிறேன்.</label>
                </div>

                <button id="generateBtn" class="generate-btn" onclick="handleGenerate()" disabled>
                    🚀 Generate Audio
                </button>

                <div id="statusMsg"></div>
                
                <div id="audioPlayerContainer" style="margin-top: 20px; display: none;">
                    <audio id="audioPlayer" controls></audio>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
