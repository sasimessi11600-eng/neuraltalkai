<!DOCTYPE html>
<html>
<head>
    <title>NeuralTalk AI</title>
    <style>
        body{margin:0;font-family:Arial,sans-serif;background:#0f172a;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px} 
        .container{width:100%;max-width:600px;background:#1e293b;padding:25px;border-radius:18px;box-shadow:0 10px 30px rgba(0,0,0,.4)} 
        h1{text-align:center;color:#38bdf8} 
        select,textarea,button,a{width:100%;margin-top:12px;padding:12px;border-radius:10px;border:none;box-sizing:border-box} 
        select,textarea{background:#0f172a;color:#fff;border:1px solid #334155} 
        textarea{height:160px;resize:vertical} 
        button{background:#38bdf8;color:#000;font-weight:bold;cursor:pointer} 
        #downloadBtn{text-decoration:none;background:#22c55e;color:#fff;display:none;text-align:center;margin-top:10px}
        audio{width:100%;margin-top:15px;display:none}
    </style>
</head>
<body>

<div class="container">
    <h1>🔥 NeuralTalk AI</h1>
    <p>உயர்தர AI குரல்கள்</p>

    <textarea id="text" placeholder="இங்கே உரையை உள்ளிடவும்..."></textarea>

    <select id="language">
        {% for code, name in languages.items() %}
            <option value="{{ code }}">{{ name }}</option>
        {% endfor %}
    </select>

    <select id="voice">
        {% for v in voices %}
            <option value="{{ v }}">{{ v }}</option>
        {% endfor %}
    </select>

    <button id="generateBtn" onclick="generateAudio()">Generate Audio</button>

    <audio id="player" controls></audio>
    <a id="downloadBtn" download="speech.wav">Download Audio</a>
</div>

<script>
async function generateAudio(){
    const text = document.getElementById('text').value.strip;
    const voice = document.getElementById('voice').value;
    const btn = document.getElementById('generateBtn');

    if(!text) { alert("Please enter text!"); return; }

    btn.disabled = true;
    btn.innerText = "Generating...";

    try {
        const response = await fetch('/generate', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({text, voice})
        });
        const data = await response.json();

        if(data.status === 'success'){
            const player = document.getElementById('player');
            const downloadBtn = document.getElementById('downloadBtn');
            
            player.src = data.audio_url;
            player.style.display = 'block';
            player.play();

            downloadBtn.href = data.audio_url;
            downloadBtn.style.display = 'block';
        } else {
            alert("Error: " + data.message);
        }
    } catch (e) {
        alert("Server error!");
    } finally {
        btn.disabled = false;
        btn.innerText = "Generate Audio";
    }
}
</script>

</body>
</html>
