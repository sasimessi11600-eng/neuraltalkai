<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuralTalk AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .card { background: #1e293b; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .slider { width: 100%; height: 8px; background: #334155; border-radius: 5px; outline: none; }
        .btn-gen { background: #38bdf8; transition: 0.3s; }
        .btn-gen:hover { background: #0ea5e9; }
    </style>
</head>
<body class="p-5 flex justify-center">
    <div class="w-full max-w-md card">
        <h1 class="text-3xl font-bold mb-6">NeuralTalk AI</h1>
        
        <select id="voice" class="w-full p-3 mb-4 rounded bg-slate-700 border-none outline-none">
            {% for v in voices %} <option value="{{ v }}">{{ v }}</option> {% endfor %}
        </select>

        <textarea id="text" rows="6" class="w-full p-4 mb-4 rounded bg-white text-black text-lg border-none" placeholder="இங்கே கதையைத் தட்டச்சு செய்யவும்..."></textarea>

        <label class="block mb-2 text-sm">Speed (வேகம்)</label>
        <input type="range" id="speed" min="0.5" max="2" step="0.5" value="1" class="slider mb-6">

        <button onclick="generateAudio()" id="genBtn" class="w-full p-4 rounded-xl font-bold text-black btn-gen mb-6">Generate</button>

        <div id="audioPlayer" class="hidden">
            <audio id="player" controls class="w-full mb-4"></audio>
            <a id="download" class="text-sky-400 font-bold block text-center" download>Download Audio</a>
        </div>
    </div>

    <script>
        async function generateAudio() {
            const btn = document.getElementById('genBtn');
            const text = document.getElementById('text').value;
            const voice = document.getElementById('voice').value;
            const speedVal = document.getElementById('speed').value;
            
            let speed = "normal";
            if(speedVal < 1) speed = "slow";
            if(speedVal > 1) speed = "fast";

            btn.innerText = "Generating...";
            btn.disabled = true;

            const res = await fetch('/generate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text, voice, speed})
            });

            const result = await res.json();
            btn.innerText = "Generate";
            btn.disabled = false;

            if(result.status === "success") {
                document.getElementById('audioPlayer').classList.remove('hidden');
                document.getElementById('player').src = result.audio_url;
                document.getElementById('download').href = result.audio_url;
                document.getElementById('player').play();
            } else {
                alert("Error: " + result.message);
            }
        }
    </script>
</body>
</html>
