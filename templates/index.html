<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>NeuralTalk AI</title><link rel='stylesheet' href='/static/style.css'></head><body><div class='box'><h1>NeuralTalk AI</h1><select id='voice'><option>Aoede</option><option>Kore</option><option>Puck</option></select><textarea id='text' placeholder='Paste story here'></textarea><label>Speed</label><input id='speed' type='range' min='0.5' max='2' step='0.1' value='1'><label>Pitch</label><input id='pitch' type='range' min='0.5' max='2' step='0.1' value='1'><button id='btn'>Generate</button><audio id='player' controls></audio><a id='download' download='audio.wav'>Download</a></div><script src='/static/script.js'></script></body></html>
