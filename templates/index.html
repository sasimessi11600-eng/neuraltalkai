<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NeuralTalk AI</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
<h1>NeuralTalk AI</h1>
<p>India Only • 10 Languages • 26 Voices</p>
<select id="language"></select>
<select id="voice"></select>
<textarea id="text" placeholder="Enter text here..."></textarea>
<label>Pitch: <span id="pitchValue">0</span></label>
<input type="range" id="pitch" min="-5" max="5" step="0.5" value="0">
<button id="generateBtn">Generate Audio</button>
<div id="result" style="display:none;">
<audio id="player" controls></audio>
<a id="downloadBtn" download>Download Audio</a>
</div>
<div class="notice">Currently available in India only. Payments via Razorpay only.</div>
</div>
<script src="/static/script.js"></script>
</body>
</html>
