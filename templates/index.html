<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NeuralTalkAI</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="wrap">
<div class="card">
<h1>NeuralTalkAI</h1>
<p class="sub">10 Indian Languages • Gemini TTS</p>

<textarea id="text" placeholder="Paste your text here..."></textarea>

<div class="grid">
<select id="voice">
<option>Kore</option>
<option>Puck</option>
<option>Zephyr</option>
<option>Aoede</option>
<option>Fenrir</option>
<option>Sulafat</option>
<option>Orus</option>
<option>Charon</option>
<option>Algenib</option>
<option>Sadaltager</option>
</select>

<input id="style" placeholder="Storyteller / Calm / News Reader">
</div>

<button onclick="generateAudio()">Generate Audio</button>

<p id="status"></p>

<audio id="player" controls style="display:none;width:100%"></audio>
<a id="download" style="display:none">Download Audio</a>

</div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
