<!DOCTYPE html>
<html>
<head>
    <title>NeuralTalk AI</title>
</head>
<body>

<h1>🔥 NeuralTalk AI</h1>

<!-- TEXT -->
<textarea id="text"></textarea>

<br><br>

<!-- LANGUAGE SELECT -->
<select id="language">
    {% for code, name in languages.items() %}
        <option value="{{ code }}">{{ name }}</option>
    {% endfor %}
</select>

<!-- VOICE SELECT -->
<select id="voice">
    {% for v in voices %}
        <option value="{{ v }}">{{ v }}</option>
    {% endfor %}
</select>

<br><br>

<button onclick="generate()">Generate</button>

<script>
function generate(){
    alert("API connect next step 🔥");
}
</script>

</body>
</html>
